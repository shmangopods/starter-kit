name: security-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Native dependency audit
        run: |
          set -e
          ran=0

          if [ -f package.json ]; then
            echo "::group::npm audit"
            npm audit --audit-level=high || exit_code=$?
            if [ "${exit_code:-0}" -ne 0 ]; then exit $exit_code; fi
            echo "::endgroup::"
            ran=1
          fi

          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            echo "::group::pip-audit"
            python -m pip install --upgrade pip pip-audit
            if [ -f requirements.txt ]; then
              pip-audit -r requirements.txt
            else
              pip-audit
            fi
            echo "::endgroup::"
            ran=1
          fi

          if [ -f Cargo.toml ]; then
            echo "::group::cargo audit"
            cargo install cargo-audit --locked
            cargo audit
            echo "::endgroup::"
            ran=1
          fi

          if [ -f go.mod ]; then
            echo "::group::govulncheck"
            go install golang.org/x/vuln/cmd/govulncheck@latest
            govulncheck ./...
            echo "::endgroup::"
            ran=1
          fi

          if [ "$ran" -eq 0 ]; then
            echo "No recognized stack manifest. Skipping native audit."
          fi

  ai-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Security review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --max-turns 30
          use_sticky_comment: true
          prompt: |
            You are an adversarial security reviewer. Operate from "assume there is at
            least one vulnerability" — if you find nothing, say so explicitly with
            reasoning.

            Scope:
            ${{ github.event_name == 'pull_request' && format('  - Read the diff with `gh pr diff {0}`. Review only the PR diff.', github.event.pull_request.number) || '  - This is a scheduled or push run. Review the full repo for newly-introduced or previously-missed security risks.' }}

            Apply these lenses:
            - **Authn/authz** — missing checks, broken access control, privilege escalation paths
            - **Secrets** — hardcoded credentials, tokens, keys committed to the repo or logs
            - **Injection** — SQL, command, template, header, XSS — any place untrusted input flows into a sink
            - **Path traversal & SSRF** — file paths, URLs constructed from user input
            - **Insecure deserialization** — pickle, eval, YAML.load, etc.
            - **Supply chain** — suspicious or unmaintained dependencies, version pinning gaps
            - **Crypto** — weak hashes, ECB mode, hardcoded IVs, custom crypto
            - **Logging** — sensitive data written to logs, including PII or tokens

            For every finding give: severity, file:line, the concrete attack vector
            (what an attacker would actually do), and a remediation.

            Severity rules:
            - BLOCKER = exploitable today, cannot ship
            - MAJOR = significant risk, must fix before next release
            - MINOR = real but low-impact (defense-in-depth gap)
            - NIT = hardening suggestion

            Output a SINGLE markdown response with this structure:

            ## Security Review Verdict: <APPROVE | REQUEST_CHANGES | BLOCK>

            ### Summary
            <2-3 sentences>

            ### Findings
            | Severity | File:Line | Vulnerability | Attack Vector | Fix |
            |----------|-----------|---------------|---------------|-----|

            ### Clean lenses
            <List the lenses where you genuinely found nothing — keeps the review honest.>

            ${{ github.event_name == 'pull_request' && 'The action will post your response as a PR comment automatically.' || 'If any BLOCKERs or MAJORs are found, open a GitHub issue titled "Security scan: <date>" with the findings using `gh issue create`. If clean, do nothing.' }}

            Do NOT modify code.

  ai-scan-openai-fallback:
    needs: ai-scan
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Capture diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > /tmp/diff.txt

      - name: Write prompt
        run: |
          cat > /tmp/prompt.md <<'PROMPT'
          You are an adversarial security reviewer running as a fallback (the primary
          Claude scanner was unavailable). Operate from "assume there is at least one
          vulnerability" — if you find nothing, say so explicitly with reasoning.

          Apply these lenses:
          - Authn/authz — missing checks, broken access control, privilege escalation
          - Secrets — hardcoded credentials, tokens, keys
          - Injection — SQL, command, template, header, XSS
          - Path traversal & SSRF — file paths/URLs from user input
          - Insecure deserialization — pickle, eval, YAML.load
          - Supply chain — suspicious deps, pinning gaps
          - Crypto — weak hashes, ECB, hardcoded IVs, custom crypto
          - Logging — sensitive data in logs, PII, tokens

          For every finding: severity, file:line, concrete attack vector, remediation.

          Severity rules: BLOCKER = exploitable today; MAJOR = significant risk;
          MINOR = low-impact; NIT = hardening suggestion.

          Output:

          ## Security Review Verdict: <APPROVE | REQUEST_CHANGES | BLOCK>

          ### Summary
          <2-3 sentences>

          ### Findings
          | Severity | File:Line | Vulnerability | Attack Vector | Fix |
          |----------|-----------|---------------|---------------|-----|

          ### Clean lenses
          <Lenses where you found nothing.>
          PROMPT

      - name: Run OpenAI fallback security scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PROMPT_FILE: /tmp/prompt.md
          DIFF_FILE: /tmp/diff.txt
          COMMENT_HEADER: "## OpenAI fallback security scan (Claude job failed)"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/openai-review.py
