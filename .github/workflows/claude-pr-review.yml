name: claude-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Multi-lens review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --max-turns 30
          use_sticky_comment: true
          prompt: |
            Review PR #${{ github.event.pull_request.number }}.

            Read the diff with `gh pr diff ${{ github.event.pull_request.number }}` and the
            PR description with `gh pr view ${{ github.event.pull_request.number }}`.

            Apply THREE review lenses, in order, in the SAME response:

            === Lens 1: Code quality ===
            Naming, complexity, dead code, idiomaticity, error handling, tests for new
            behavior, stale comments, duplication. Cite file:line. Skip security and
            architecture (covered by other lenses).

            === Lens 2: Security ===
            OWASP categories. Authn/authz holes. Secrets in code. Injection (SQL, command,
            template). Path traversal. SSRF. Insecure deserialization. Supply-chain risk
            (suspicious deps). For each finding, cite file:line and the concrete attack
            vector — not just "this is risky."

            === Lens 3: Architecture ===
            Fit (does this belong here?). Coupling (what new dependencies between modules?).
            Lock-in (does this commit us to a path that's expensive to undo?). Simpler
            alternatives that achieve the same goal. Bias toward "do less."

            Operate from "assume there is at least one issue." If you genuinely find
            nothing in a lens, say so explicitly with reasoning.

            Output a SINGLE markdown PR comment with this exact structure:

            ## Review Verdict: <APPROVE | REQUEST_CHANGES | BLOCK>

            ### Summary
            <2-3 sentences>

            ### Findings
            | Lens | Severity | File:Line | Issue | Suggested Fix |
            |------|----------|-----------|-------|---------------|
            | Code | BLOCKER | ... | ... | ... |
            | Security | MAJOR | ... | ... | ... |
            | Architecture | MINOR | ... | ... | ... |

            ### What to fix first
            <Bullet list of BLOCKERs and MAJORs only. Empty section if none.>

            Severity rules:
            - BLOCKER = bug, broken behavior, real vulnerability, cannot ship
            - MAJOR = significant correctness/maintainability/security concern
            - MINOR = real issue, low impact
            - NIT = preference / polish

            Verdict rules:
            - Any BLOCKER → BLOCK
            - 2+ MAJORs or 1 MAJOR without offsetting context → REQUEST_CHANGES
            - All MINOR/NIT or clean → APPROVE

            Do NOT modify code. Do NOT push commits. Review only.
